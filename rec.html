<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recorder Cricket</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d1117;
    color:white;
    height:100vh;
    overflow:hidden;
}

.container{
    width:100%;
    height:100vh;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

.header{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(10px);
    z-index:10;
}

.controls{
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:15px;
    z-index:10;
}

button{
    border:none;
    padding:14px 22px;
    border-radius:50px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.record{
    background:#ff2d55;
    color:white;
}

.stop{
    background:#ff9500;
    color:white;
}

.save{
    background:#22c55e;
    color:white;
}

.discard{
    background:#ef4444;
    color:white;
}

.hidden{
    display:none;
}

.status{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    font-size:18px;
    z-index:10;
}

.recording-dot{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    background:red;
    margin-right:8px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>
<body>

<div class="container">

    <div class="header">🏏 Recorder Cricket</div>

    <div class="status" id="status">
        Ready to Record
    </div>

    <video id="camera" autoplay playsinline muted></video>
    <video id="replay" controls class="hidden"></video>

    <div class="controls" id="recordControls">
        <button class="record" id="recordBtn">🎥 Record</button>
        <button class="stop hidden" id="stopBtn">⏹ Stop</button>
    </div>

    <div class="controls hidden" id="reviewControls">
        <button class="save" id="saveBtn">💾 Save Video</button>
        <button class="discard" id="discardBtn">🗑 Discard</button>
    </div>

</div>

<script>
const camera = document.getElementById("camera");
const replay = document.getElementById("replay");

const recordBtn = document.getElementById("recordBtn");
const stopBtn = document.getElementById("stopBtn");

const saveBtn = document.getElementById("saveBtn");
const discardBtn = document.getElementById("discardBtn");

const recordControls = document.getElementById("recordControls");
const reviewControls = document.getElementById("reviewControls");

const statusText = document.getElementById("status");

let mediaRecorder;
let recordedChunks = [];
let videoBlob;

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:true
        });

        camera.srcObject = stream;

        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = e => {
            if(e.data.size > 0){
                recordedChunks.push(e.data);
            }
        };

        mediaRecorder.onstop = () => {

            videoBlob = new Blob(recordedChunks,{
                type:"video/webm"
            });

            const videoURL = URL.createObjectURL(videoBlob);

            replay.src = videoURL;

            camera.classList.add("hidden");
            replay.classList.remove("hidden");

            recordControls.classList.add("hidden");
            reviewControls.classList.remove("hidden");

            statusText.innerHTML = "Replay Ready";
        };

    } catch(err){
        alert("Camera access denied.");
        console.error(err);
    }
}

recordBtn.onclick = () => {

    recordedChunks = [];

    mediaRecorder.start();

    recordBtn.classList.add("hidden");
    stopBtn.classList.remove("hidden");

    statusText.innerHTML =
        '<span class="recording-dot"></span>Recording...';
};

stopBtn.onclick = () => {

    mediaRecorder.stop();

    stopBtn.classList.add("hidden");

    statusText.innerHTML = "Processing Video...";
};

saveBtn.onclick = () => {

    const a = document.createElement("a");

    a.href = URL.createObjectURL(videoBlob);

    const date = new Date().toISOString().replace(/[:.]/g,"-");

    a.download = `RecorderCricket-${date}.webm`;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    alert("Video downloaded. On mobile, save/share it to your gallery.");
};

discardBtn.onclick = () => {

    replay.pause();
    replay.removeAttribute("src");
    replay.load();

    videoBlob = null;
    recordedChunks = [];

    replay.classList.add("hidden");
    camera.classList.remove("hidden");

    reviewControls.classList.add("hidden");
    recordControls.classList.remove("hidden");

    recordBtn.classList.remove("hidden");

    statusText.innerHTML = "Video Discarded. Ready to Record";
};

startCamera();
</script>

</body>
</html>
